version: '3.8'

services:
  ips-syslog:
    build: .
    container_name: ips-syslog
    restart: unless-stopped
    ports:
      - "514:514/udp"
      - "8080:8080/tcp"
      - "8081:8081/tcp"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    networks:
      - ips-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    cap_add:
      - NET_BIND_SERVICE

  # 可选：添加自动解封定时任务
  auto-unblock:
    build: .
    container_name: ips-auto-unblock
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    networks:
      - ips-network
    command: >
      sh -c "while true; do
        python3 blacklist_manager.py cleanup &&
        sleep 3600;
      done"
    depends_on:
      ips-syslog:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

networks:
  ips-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16